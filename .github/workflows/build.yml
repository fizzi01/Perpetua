name: Build

on:
  workflow_dispatch:
    inputs:
      update-release:
        description: "Update assets of the latest release"
        type: boolean
        default: false
  release:
    types: [published]

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "24"

jobs:
  build-desktop:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            platform: macOS-arm64
            rust-target: aarch64-apple-darwin
            gui-exe-name: perpetua
            build-output: .build/aarch64-apple-darwin/release
            archive-name: Perpetua-macOS
            archive-ext: zip
          - os: macos-15-intel
            platform: macOS-x86_64
            rust-target: x86_64-apple-darwin
            gui-exe-name: perpetua
            build-output: .build/x86_64-apple-darwin/release
            archive-name: Perpetua-macOS_15-Intel
            archive-ext: zip
          - os: macos-15
            platform: macOS_15-arm64
            rust-target: aarch64-apple-darwin
            gui-exe-name: perpetua
            build-output: .build/aarch64-apple-darwin/release
            archive-name: Perpetua-macOS_15
            archive-ext: zip
          - os: windows-latest
            platform: Windows-x86_64
            rust-target: x86_64-pc-windows-msvc
            gui-exe-name: perpetua.exe
            build-output: .build/x86_64-pc-windows-msvc/release
            archive-name: Perpetua-Windows-x86_64
            archive-ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Poetry
        run: pipx install poetry

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: poetry

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: brew install automake autoconf libtool ccache

      - name: Install Python dependencies
        run: poetry install --only main,build --no-interaction -v

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-gui/src-tauri -> target
          shared-key: build-${{ matrix.platform }}

      - name: Cache Tauri CLI
        id: cache-tauri-cli
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/cargo-tauri
            ~/.cargo/bin/cargo-tauri.exe
          key: tauri-cli-${{ matrix.platform }}-v2

      - name: Install Tauri CLI
        if: steps.cache-tauri-cli.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Install npm dependencies
        working-directory: src-gui
        run: npm install

      - name: Build GUI
        working-directory: src-gui
        run: cargo tauri build --target ${{ matrix.rust-target }}

      - name: Decode and import certificate
        if: runner.os == 'macOS'
        env:
          MAC_CERTIFICATE: ${{ secrets.CERTIFICATE }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$MAC_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p $KEYCHAIN_PASSWORD build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$MAC_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          rm certificate.p12

      - name: Build daemon
        run: poetry run python build.py --skip-gui --nuitka-args --assume-yes-for-downloads

      - name: Clean Nuitka build cache
        run: find ${{ matrix.build-output }} -maxdepth 1 -name '*.build' -type d -exec rm -rf {} +
        shell: bash

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          chmod +x ${{ matrix.build-output }}/Perpetua.app/Contents/MacOS/Perpetua
          chmod +x ${{ matrix.build-output }}/Perpetua.app/Contents/MacOS/_perpetua
          ditto -c -k --sequesterRsrc --keepParent ${{ matrix.build-output }}/Perpetua.app ${{ matrix.build-output }}/${{ matrix.archive-name }}.zip

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist = Get-ChildItem -Path "${{ matrix.build-output }}" -Filter "*.dist" -Directory
          if ($dist) {
            Rename-Item -Path $dist.FullName -NewName "Perpetua"
          }
          Compress-Archive -Path "${{ matrix.build-output }}/Perpetua" -DestinationPath "${{ matrix.build-output }}/${{ matrix.archive-name }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.archive-name }}
          path: ${{ matrix.build-output }}/${{ matrix.archive-name }}.${{ matrix.archive-ext }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux build inside ubuntu:24.04 container.
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build (Linux-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container:
      image: ubuntu:24.04
      # /tmp is shared by default; nothing else is needed.
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            build-output: .build/x86_64-unknown-linux-gnu/release
            archive-name: Perpetua-Linux-x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            rust-target: aarch64-unknown-linux-gnu
            build-output: .build/aarch64-unknown-linux-gnu/release
            archive-name: Perpetua-Linux-aarch64

    env:
      DEBIAN_FRONTEND: noninteractive
      CARGO_HOME: /root/.cargo
      RUSTUP_HOME: /root/.rustup

    steps:
      - name: Prepare container (toolchain + build deps)
        run: |
          set -eux
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl wget gnupg git file sudo \
            build-essential pkg-config \
            libssl-dev libtiff-dev libgtk-3-dev libxdo-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            automake libtool fakeroot patchelf \
            python3.12 python3.12-venv python3.12-dev python3-pip pipx
          # Node ${{ env.NODE_VERSION }} from NodeSource (the apt default is
          # too old for the Tauri JS toolchain we use).
          curl -fsSL https://deb.nodesource.com/setup_${{ env.NODE_VERSION }}.x | bash -
          apt-get install -y --no-install-recommends nodejs
          # actions/checkout drops the workspace owned by the host runner UID;
          # tell git not to complain when we touch it as root in the container.
          git config --global --add safe.directory '*'

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Poetry
        run: |
          pipx install poetry
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal \
                       --target ${{ matrix.rust-target }}
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-gui/src-tauri -> target
          shared-key: build-Linux-${{ matrix.arch }}

      - name: Cache Tauri CLI
        id: cache-tauri-cli
        uses: actions/cache@v5
        with:
          path: ${{ env.CARGO_HOME }}/bin/cargo-tauri
          key: tauri-cli-Linux-${{ matrix.arch }}-v2

      - name: Install Tauri CLI
        if: steps.cache-tauri-cli.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Install Python dependencies
        run: poetry install --only main,build --no-interaction -v

      - name: Install npm dependencies
        working-directory: src-gui
        run: npm install

      - name: Build GUI
        working-directory: src-gui
        run: cargo tauri build --target ${{ matrix.rust-target }}

      - name: Build daemon
        run: poetry run python build.py --skip-gui --nuitka-args --assume-yes-for-downloads

      - name: Clean Nuitka build cache
        run: find ${{ matrix.build-output }} -maxdepth 1 -name '*.build' -type d -exec rm -rf {} +

      - name: Package (.deb + AppImage)
        run: |
          set -eux
          chmod +x ${{ matrix.build-output }}/Perpetua.dist/Perpetua
          chmod +x ${{ matrix.build-output }}/Perpetua.dist/_perpetua
          bash scripts/make_deb.sh
          bash scripts/make_appimage.sh
          cp .build/perpetua_*.deb       "${{ matrix.build-output }}/${{ matrix.archive-name }}.deb"
          cp .build/Perpetua-*.AppImage  "${{ matrix.build-output }}/${{ matrix.archive-name }}.AppImage"

      - name: Upload .deb + .AppImage
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.archive-name }}
          path: |
            ${{ matrix.build-output }}/${{ matrix.archive-name }}.deb
            ${{ matrix.build-output }}/${{ matrix.archive-name }}.AppImage
          if-no-files-found: error

      - name: Upload Nuitka dist (input for RPM packaging)
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.archive-name }}-dist
          path: ${{ matrix.build-output }}/Perpetua.dist
          if-no-files-found: error
          # The dist is large (>200 MB) and only feeds the RPM job; nothing
          # external should depend on it.
          retention-days: 3
  build-linux-rpm:
    name: Package RPM (Linux-${{ matrix.arch }})
    needs: build-linux
    runs-on: ${{ matrix.runner }}
    container:
      image: fedora:latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            build-output: .build/x86_64-unknown-linux-gnu/release
            archive-name: Perpetua-Linux-x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            build-output: .build/aarch64-unknown-linux-gnu/release
            archive-name: Perpetua-Linux-aarch64

    steps:
      - name: Prepare container
        run: |
          set -eux
          dnf install -y --setopt=install_weak_deps=False \
            git rpm-build tar gzip findutils which
          git config --global --add safe.directory '*'

      - name: Checkout (for scripts/ and pyproject.toml)
        uses: actions/checkout@v6

      - name: Download Nuitka dist from build-linux
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.archive-name }}-dist
          path: ${{ matrix.build-output }}/Perpetua.dist

      - name: Build RPM
        run: |
          set -eux
          chmod +x ${{ matrix.build-output }}/Perpetua.dist/Perpetua
          chmod +x ${{ matrix.build-output }}/Perpetua.dist/_perpetua
          bash scripts/make_rpm.sh
          mkdir -p artifacts
          cp .build/perpetua-*.rpm "artifacts/${{ matrix.archive-name }}.rpm"

      - name: Upload .rpm
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.archive-name }}-rpm
          path: artifacts/${{ matrix.archive-name }}.rpm
          if-no-files-found: error
  smoke-test-linux:
    name: Smoke (${{ matrix.label }})
    needs: [build-linux, build-linux-rpm]
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu-24.04
            container: ubuntu:24.04
            kind: deb
            install: apt-get update && apt-get install -y --no-install-recommends ./pkg.deb
          - label: debian-trixie
            container: debian:trixie-slim
            kind: deb
            install: apt-get update && apt-get install -y --no-install-recommends ./pkg.deb
          - label: fedora-latest
            container: fedora:latest
            kind: rpm
            install: dnf install -y ./pkg.rpm
          - label: archlinux
            container: archlinux:latest
            kind: appimage
            install: ":"  # AppImage is portable; no install step

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Prepare container (needs tools to download + inspect)
        run: |
          set -eux
          if command -v apt-get >/dev/null; then
            apt-get update
            apt-get install -y --no-install-recommends ca-certificates file libc-bin
          elif command -v dnf >/dev/null; then
            dnf install -y file glibc
          elif command -v pacman >/dev/null; then
            pacman -Sy --noconfirm file fuse2 libei
          fi

      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.kind == 'rpm' && 'Perpetua-Linux-x86_64-rpm' || 'Perpetua-Linux-x86_64' }}
          path: artifacts

      - name: Stage package as ./pkg.${{ matrix.kind }}
        run: |
          set -eux
          case "${{ matrix.kind }}" in
            deb)      cp artifacts/*.deb      pkg.deb ;;
            rpm)      cp artifacts/*.rpm      pkg.rpm ;;
            appimage) cp artifacts/*.AppImage pkg.AppImage ;;
          esac
          ls -la pkg.*

      - name: Install package
        if: matrix.kind != 'appimage'
        run: ${{ matrix.install }}

      - name: Verify binary resolves all shared libs
        run: |
          set -eux
          if [ "${{ matrix.kind }}" = "appimage" ]; then
            chmod +x pkg.AppImage
            # FUSE may be unavailable in the container; --appimage-extract
            # works without it.
            ./pkg.AppImage --appimage-extract >/dev/null
            BIN=squashfs-root/usr/lib/Perpetua/Perpetua
          else
            BIN=/opt/Perpetua/Perpetua
          fi
          file "$BIN"
          # ldd's exit code is unreliable (it returns 0 even with "not
          # found"), so grep for the marker explicitly. Exit non-zero if any
          # unresolved lib remains.
          if ldd "$BIN" | grep -E 'not found'; then
            echo "::error::Unresolved shared library on ${{ matrix.label }}"
            ldd "$BIN"
            exit 1
          fi
          echo "OK: all libs resolved on ${{ matrix.label }}"
  update-release:
    name: Update Release
    if: github.event_name == 'release' || inputs.update-release
    needs: [build-desktop, build-linux, build-linux-rpm, smoke-test-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: Perpetua-*
          path: artifacts
          merge-multiple: true

      - name: Get latest release tag
        if: inputs.update-release
        id: latest-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "tag=$(gh release view --repo ${{ github.repository }} --json tagName -q .tagName)" >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.latest-release.outputs.tag || github.event.release.tag_name }}
          files: |
            artifacts/*.zip
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.AppImage
