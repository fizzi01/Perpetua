name: Warm Build Cache

on:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "24"

jobs:
  warm-cache:
    name: Warm Cache (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            platform: macOS-arm64
            rust-target: aarch64-apple-darwin
          - os: macos-15-intel
            platform: macOS-x86_64
            rust-target: x86_64-apple-darwin
          - os: windows-latest
            platform: Windows-x86_64
            rust-target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            platform: Linux-x86_64
            rust-target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Poetry
        run: pipx install poetry

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: poetry

      - name: Install Python dependencies
        run: poetry install --only main,build --no-interaction -v

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: brew install automake autoconf libtool ccache

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libtiff-dev \
            libgtk-3-dev \
            automake \
            libtool \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            fakeroot

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-gui/src-tauri -> target
          shared-key: build-${{ matrix.platform }}

      - name: Cache Tauri CLI
        id: cache-tauri-cli
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/cargo-tauri
            ~/.cargo/bin/cargo-tauri.exe
          key: tauri-cli-${{ matrix.platform }}-v2

      - name: Install Tauri CLI
        if: steps.cache-tauri-cli.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Install npm dependencies
        working-directory: src-gui
        run: npm install

      - name: Build GUI
        working-directory: src-gui
        run: cargo tauri build --target ${{ matrix.rust-target }}