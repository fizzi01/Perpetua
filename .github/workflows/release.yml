name: release-please

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.PERPETUA_TOKEN }}
          release-type: python

      - name: Sync version for Tauri
        if: ${{ steps.release.outputs.pr != '' }}
        env:
          GH_TOKEN: ${{ secrets.PERPETUA_TOKEN }}
        run: |
          PR_BRANCH=$(echo '${{ steps.release.outputs.pr }}' | jq -r '.headBranchName')
          git fetch origin "$PR_BRANCH"
          git checkout "$PR_BRANCH"

          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Detected version: $VERSION"

          TAURI_CONF="src-gui/src-tauri/tauri.conf.json"
          jq --arg v "$VERSION" '.version = $v' "$TAURI_CONF" > tmp.json && mv tmp.json "$TAURI_CONF"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet "$TAURI_CONF"; then
            echo "tauri.conf.json already up to date"
          else
            git add "$TAURI_CONF"
            git commit --amend --no-edit
            git push --force origin "$PR_BRANCH"
          fi

      - name: Create alpha pre-release
        if: ${{ steps.release.outputs.pr != '' || github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ secrets.PERPETUA_TOKEN }}
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          TAURI_CONF="src-gui/src-tauri/tauri.conf.json"
          ALPHA_VERSION="${VERSION}-alpha"
          ALPHA_TAG="v${ALPHA_VERSION}"
          ALPHA_BRANCH="pre-release/v${ALPHA_VERSION}"

          # Clean up all previous alpha releases and branches
          gh release list --json tagName -q '.[].tagName' | { grep '\-alpha$' || true; } | while read -r tag; do
            echo "Deleting alpha release: $tag"
            gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          done
          git ls-remote --heads origin 'refs/heads/pre-release/v*-alpha' | awk '{print $2}' | sed 's|refs/heads/||' | while read -r branch; do
            echo "Deleting alpha branch: $branch"
            git push origin --delete "$branch" 2>/dev/null || true
          done

          # Create alpha branch with updated version files
          git checkout -b "$ALPHA_BRANCH"
          jq --arg v "$ALPHA_VERSION" '.version = $v' "$TAURI_CONF" > tmp.json && mv tmp.json "$TAURI_CONF"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$TAURI_CONF"
          git commit -m "chore: set version to ${ALPHA_VERSION}"
          git push origin "$ALPHA_BRANCH"

          # Create pre-release (triggers build.yml via 'release: published')
          gh release create "$ALPHA_TAG" \
            --target "$ALPHA_BRANCH" \
            --title "v${ALPHA_VERSION}" \
            --prerelease \
            --generate-notes

      - name: Cleanup alpha pre-releases
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.PERPETUA_TOKEN }}
        run: |
          # Delete all alpha releases and tags
          gh release list --json tagName -q '.[].tagName' | { grep '\-alpha$' || true; } | while read -r tag; do
            echo "Deleting alpha release: $tag"
            gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          done

          # Delete all alpha branches
          git ls-remote --heads origin 'refs/heads/pre-release/v*-alpha' | awk '{print $2}' | sed 's|refs/heads/||' | while read -r branch; do
            echo "Deleting alpha branch: $branch"
            git push origin --delete "$branch" 2>/dev/null || true
          done
